services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recalltube}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recalltube}
      POSTGRES_DB: ${POSTGRES_DB:-recalltube}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recalltube}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
