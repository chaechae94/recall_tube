services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recalltube}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recalltube}
      POSTGRES_DB: ${POSTGRES_DB:-recalltube}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recalltube}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # db 컨테이너 네트워크 이름으로 접속 (backend/.env의 localhost 값을 덮어씀)
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-recalltube}:${POSTGRES_PASSWORD:-recalltube}@db:5432/${POSTGRES_DB:-recalltube}
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - whisper_cache:/root/.cache/whisper
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  backend_uploads:
  whisper_cache:
